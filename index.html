<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- ── SEO ── -->
    <title>CuTasks — Task Manager for Focused People</title>
    <meta name="description" content="CuTasks is a free, powerful task management app with projects, habits, Pomodoro timer, and cloud sync. Stay organized and focused." />
    <meta name="keywords" content="task manager, todo app, productivity, project management, habits tracker, pomodoro timer, time management, to-do list, task planner, focus app" />
    <meta name="author" content="CuTasks" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cutasks.com/" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cutasks.com/" />
    <meta property="og:title" content="CuTasks — Task Manager for Focused People" />
    <meta property="og:description" content="Free, powerful task management app with projects, habits, Pomodoro timer, and cloud sync. Stay organized and focused." />
    <meta property="og:image" content="https://cutasks.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CuTasks — Task Manager" />
    <meta property="og:site_name" content="CuTasks" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://cutasks.com/" />
    <meta name="twitter:title" content="CuTasks — Task Manager for Focused People" />
    <meta name="twitter:description" content="Free, powerful task management app with projects, habits, Pomodoro timer, and cloud sync." />
    <meta name="twitter:image" content="https://cutasks.com/og-image.png" />
    <meta name="twitter:image:alt" content="CuTasks — Task Manager" />

    <!-- ── Favicon (браузер) ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── PWA Manifest ── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Apple PWA ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CuTasks" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120x120.png" />

    <!-- ── Theme color ── -->
    <meta name="theme-color" content="#121212" />

    <!-- ── Mobile web app (Android Chrome) ── -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Structured Data (JSON-LD) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CuTasks",
      "url": "https://cutasks.com",
      "description": "Free, powerful task management app with projects, habits, Pomodoro timer, and cloud sync.",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Task management with priorities and deadlines",
        "Project organization with sections",
        "Habit tracking with streaks",
        "Pomodoro timer",
        "Calendar view",
        "Cloud sync with Firebase",
        "13 languages support",
        "Dark, Light, and Midnight themes"
      ]
    }
    </script>

    <script>
      (function() {
        var theme = localStorage.getItem('cutasks_theme');
        if (theme) document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
